<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!--
    macOS menu-bar template image: pure black shapes + transparent cut-outs only.
    Drawn pixel-aligned on a 16-unit grid so the 16x16 raster is crisp;
    every negative-space feature (eyes, mouth, claw notches, gaps) is >= 2 units,
    i.e. >= 2px at 16x16.
  -->

  <mask id="cutouts">
    <rect width="16" height="16" fill="white"/>

    <!-- pincer notches (2px wide, cut through the top edge) -->
    <rect x="3" y="-1" width="2" height="3" fill="black"/>
    <rect x="11" y="-1" width="2" height="3" fill="black"/>

    <!-- eyes (2x2 px) -->
    <rect x="5" y="8" width="2" height="2" fill="black"/>
    <rect x="9" y="8" width="2" height="2" fill="black"/>

    <!-- mouth (4x2 px capsule) -->
    <rect x="6" y="12" width="4" height="2" rx="1" fill="black"/>
  </mask>

  <g mask="url(#cutouts)" fill="black">
    <!-- left and right claws (2px gap between them, 2px gap above body) -->
    <rect x="1" y="0" width="6" height="4" rx="1.5"/>
    <rect x="9" y="0" width="6" height="4" rx="1.5"/>

    <!-- body -->
    <rect x="4" y="6" width="8" height="10" rx="3"/>
  </g>

</svg>
