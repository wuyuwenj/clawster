<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clawster Chat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* Opaque mat: the chatbar window is opaque, so the whole window must
           read as one surface. Driven by the --tp-shell token so it follows the
           theme (dark #0f0f0f default, Tidepool cream in light); the fallback
           matches the dark window backgroundColor for the pre-CSS first paint. */
        background: var(--tp-shell, #0f0f0f);
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./chatbar/main.tsx"></script>
  </body>
</html>
